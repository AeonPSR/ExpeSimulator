name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test -- --ci --colors

      - name: Check no DOM access in probability module
        run: |
          if grep -rn "document\." js/probability/; then
            echo "DOM access (document.) found in js/probability/ — this module must stay pure"
            exit 1
          fi
